[goldmark]
    [goldmark.extensions]
        [goldmark.extensions.passthrough]
            enable = true

            [goldmark.extensions.passthrough.delimiters]
                block  = [["\\[", "\\]"], ["$$", "$$"]]
                inline = [["\\(", "\\)"]]

    [goldmark.renderer]
        ## Set to true if you have HTML content inside Markdown
        unsafe = true

[tableOfContents]
    startLevel = 1
    endLevel   = 6
    ordered    = true

[highlight]
    noClasses          = false
    codeFences         = true
    guessSyntax        = true
    lineNoStart        = 1
    lineNos            = true
    lineNumbersInTable = true
    tabWidth           = 4
